    <!--A01: O JS geralmente é inserido no final do body. Podemos inseri-lo no head, que é a primeira coisa que será carregada, mas não faz muito sentido, porque se o código js for adicionado lá e for grande, a página não vai carregar o body, deixando a página em branco (o carregamento é de cima para baixo). O js no final permite o carregamento do head e dos elementos da página para depois carregar o js (que fará o site funcionar)-->
