<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Página de teste</title> 
    <link rel="stylesheet" href="estilo.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">

  <body>
    <h1>Página de teste</h1>
     <h2>Área de Cadastro</h2>
    <form action="Páginas/login.html" method="get">
      <label>
        Digite o nome completo:<br/>
        <input type="text" name="nome"/>
      </label>
      
      <label>
        Descrição:<br/>
        <textarea name="descricao"></textarea>
      </label>
      
      <label>
        Categoria:<br/>
        <select name="categoria">
          <option value="categoria1">Categoria 1</option>
          <option value="categoria2">Categoria 2</option>
          <option value="categoria3">Categoria 3</option>
          <option value="categoria4">Categoria 4</option>
          <option value="categoria5">Categoria 5</option>
        </select>
      </label>
      
      <label>Leia o contrato e aceite os termos para continuar:
        <br/>
        <input type="checkbox" name="aceito"> Declaro que li e aceito os <a href="Páginas/contrato.html" target="_blank" id="termoslink">termos do contrato</a>.
      </label>
      
      <input type="submit" value="Cadastrar" /> 
    </form>

    </form>
  </body>
