<!DOCTYPE html>

  <body>
    <!-- <b>: negrito
         <strong>: negrito, porém com ênfase no navegador (semântica importante, não alterando o visual porém com acessibilidade para pessoas com visão limitada)
        <i>: itálico
        <em>: itálico, porém com semântica (assim como o strong)
        <small>: deixa a fonte menor em relação ao tamanho determinado da fonte do texto.
        <del>: tachado.
        <marl>: marca o texto em amarelo.
        <sup>: palavra elevada.
        <sub>: palavra rebaixada.
      -->
    Lorem <b>ipsum</b> dolor, sit <strong>amet</strong> consectetur adipisicing elit. <i>Deleniti</i> voluptates <em>aliquid</em> distinctio, <sup>laudantium</sup> numquam <sub>excepturi</sub> modi doloribus, adipisci placeat atque <del>aspernatur</del> quae <mark>id aut vel</mark> harum, 
    <small>soluta odio asperiores molestias!</small>
  </body>
</html>
