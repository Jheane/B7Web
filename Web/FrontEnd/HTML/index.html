<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Página de teste</title> 
    <link rel="stylesheet" href="estilo.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1>Página de teste</h1>
    <!--É interessante associar cada formulário em um determinado grupo, já que uma página pode conter ns formulários-->
    <h2>Área de Cadastro</h2>
    <form action="paginas/login.html" method="get">
      <input type="text" name="usuario" value="123"/> <!-- Tag de entrada de dados: type="text": adiciona campo de texto; "password": senha; "checkbox": caixa de marcação; "radio" name="x": bolinha de seleção (o radio faz sentido quando é mais de uma opção, e, para marcar apenas uma opção, é necessário que o atributo name esteja definido como igual em todo o grupo do tipo radio); "submit": botão de envio de informações; "email": formata para e-mail, pedindo @ conforme construção de endereço -->
      <!-- value: valor pré-preenchido na caixa de texto -->
    </form><!-- Adição de ação dentro do form para redirecionar as informações, tendo os métodos GET e POST (GET: joga as informações dentro da URL do navegador; POST: as informações são enviadas de forma interna, não sendo mostradas na URL) --> 
      <input type="submit" name="cadastro" value="Confirmar"><!-- o value no submit será mostrado dentro do botão-->
    </form>
    <h2>Área de Login</h2>
    <form>

    </form>
  </body>
</html>
