<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Página de teste</title> 
    <link rel="stylesheet" href="estilo.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1>Página de teste</h1>
     <h2>Área de Cadastro</h2>
    <form method="get">
      <!--As validações de campos podem ser via JS, ou pelo próprio campo, usando o atributo required-->
      <input type="hidden" name="pais" value="JP"/>
      <!--Geralmente, campos hidden ficam no começo do form, para não ficar bagunçado no meio do código. Esse tipo de campo costuma ser usado quando é uma informação necessária mas que não precisa ser mostrada para o usuário do site. ID de um registro, token de acesso, token de liberação... são ótimos exemplos de campos que devem ser tipo hidden-->
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label>
          Nome: <br/>
          <input type="text" name="nome" required minlength="2" maxlength="30"/>
          <!--O required não permite que o formulário seja enviado com o campo em branco. Já o minlength determina o tamanho mínimo do texto, que, nesse caso, são 2 caracteres. O maxlength determina o tamanho máximo do texto aceito, não permitindo que sejam digitados caracteres além do definido.-->
        </label>
        <br/>
        <label>
          Sobrenome: <br/>
          <input type="text" name="sobrenome"/>
        </label>
        <br/>
      </fieldset>

      <fieldset>
        <legend>Dados Profissionais</legend>
        <label>
          Empresa: <br/>
          <input type="text" name="empresa"/>
        </label>
        <br/>
        <label>
          Cargo: <br/>
          <input type="text" name="cargo"/>
        </label>
      </fieldset>

      <input type="submit" value="Cadastrar"/>
    <form>

    </form>
  </body>
</html>
