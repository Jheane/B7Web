<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Página de teste</title> 
    <link rel="stylesheet" href="estilo.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1>Página de teste</h1>
     <h2>Área de Cadastro</h2>
    <form method="post">
      <fieldset><!-- Cria um conjunto, que é delimitado visualmente por um retângulo-->
        <legend>Dados Pessoais</legend> <!-- Permite que coloquemos a legenda da fieldset, onde o texto será exibido entre a borda do retângulo da fieldset, estando em conjunto com ele -->
        <label>
          Nome: <br/>
          <input type="text" name="nome"/>
        </label>
        <br/>
        <label>
          Sobrenome: <br/>
          <input type="text" name="sobrenome"/>
        </label>
      </fieldset>

      <fieldset>
        <legend>Dados Profissionais</legend>
        <label>
          Empresa: <br/>
          <input type="text" name="empresa"/>
        </label>
        <br/>
        <label>
          Cargo: <br/>
          <input type="text" name="cargo"/>
        </label>
      </fieldset>

      <input type="submit" value="Cadastrar"/>
    <form>

    </form>
  </body>
</html>
